<!DOCTYPE html>
<html>

<head>

<title>Edit Expense</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Edit Expense</h2>

<form method="POST">

<div class="mb-3">
<input type="text" name="title" class="form-control" value="{{ expense.title }}">
</div>

<div class="mb-3">

<select name="category" class="form-select">

<option {{'selected' if expense.category=='Food'}}>Food</option>
<option {{'selected' if expense.category=='Rent'}}>Rent</option>
<option {{'selected' if expense.category=='Travel'}}>Travel</option>
<option {{'selected' if expense.category=='Bills'}}>Bills</option>
<option {{'selected' if expense.category=='Shopping'}}>Shopping</option>

</select>

</div>

<div class="mb-3">
<input type="number" step="0.01" name="amount" class="form-control" value="{{ expense.amount }}">
</div>

<button class="btn btn-success">Update Expense</button>

<a href="/" class="btn btn-secondary">Cancel</a>

</form>

</div>

</body>
</html>
