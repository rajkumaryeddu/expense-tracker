<!DOCTYPE html>
<html>
<head>

<title>Expense Tracker Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">💰 Expense Tracker Dashboard</h2>

<!-- Expense Form -->

<div class="card p-4 mb-4 shadow">

<form action="/add" method="POST" class="row g-3">

<div class="col-md-4">
<input type="text" name="title" class="form-control" placeholder="Expense Name" required>
</div>

<div class="col-md-3">
<select name="category" class="form-select" required>

<option value="">Category</option>
<option>Food</option>
<option>Rent</option>
<option>Travel</option>
<option>Bills</option>
<option>Shopping</option>

</select>
</div>

<div class="col-md-3">
<input type="number" step="0.01" name="amount" class="form-control" placeholder="Amount" required>
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100">Add Expense</button>
</div>

</form>

</div>

<!-- Dashboard -->

<div class="row mb-4">

<div class="col-md-4">

<div class="card text-center p-4 shadow">

<h4>Total Expense</h4>
<h2>₹ {{ total }}</h2>

</div>

</div>

<div class="col-md-8">

<div class="card p-4 shadow">

<h5 class="text-center">Expense by Category</h5>

<div class="chart-container">
    <canvas id="expenseChart"></canvas>
</div>
</div>

</div>

</div>

<!-- Expense Table -->

<div class="card p-4 shadow">

<h4>Expense List</h4>
<input type="text" id="searchInput" class="form-control mb-3" placeholder="Search expense...">

<table class="table table-striped">

<thead>

<tr>

<th>Title</th>
<th>Category</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for expense in expenses %}

<tr>

<td>{{ expense.title }}</td>
<td>{{ expense.category }}</td>
<td>₹ {{ expense.amount }}</td>
<td>{{ expense.date.strftime('%d-%m-%Y') }}</td>

<td>

<a href="/edit/{{ expense.id }}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete/{{ expense.id }}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

<!-- Chart Script -->

<script id="chart-data" type="application/json">
{
"labels": {{ labels | tojson }},
"values": {{ values | tojson }}
}
</script>

<!-- Chart Script -->

<script>

const chartData = JSON.parse(
document.getElementById("chart-data").textContent
);

const labels = chartData.labels;
const values = chartData.values;

const ctx = document.getElementById('expenseChart').getContext('2d');

new Chart(ctx, {

type: 'pie',

data: {
labels: labels,
datasets: [{
label: "Expenses",
data: values,

backgroundColor: [
"#36A2EB",
"#FF6384",
"#FF9F40",
"#4BC0C0",
"#FFCD56"
],

borderWidth: 1
}]
},

options: {
responsive: true,
plugins: {
legend: {
position: 'top'
}
}
}

});

</script>

<script>

const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("keyup", function(){

const filter = searchInput.value.toLowerCase();
const rows = document.querySelectorAll("table tbody tr");

rows.forEach(row => {

const text = row.innerText.toLowerCase();

row.style.display = text.includes(filter) ? "" : "none";

});

});

</script>

</body>
</html>
